[tox]
envlist = py{310,311,312,313}

[pytest]
python_classes = *Tests *TestCase *Test
python_files = test_*.py *_tests.py
# testpaths = test

[testenv]
deps=pytest
     blessed
     PyHamcrest
     configobj
     commodity
     doublex
passenv = TERM
          SHELL
          HOME
          PYTHONPATH
commands=pytest test
